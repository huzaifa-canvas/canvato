<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Canvato</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-page">
        <!-- Visual Side -->
        <div class="auth-visual">
            <img src="assets/images/auth_bg.png" alt="Canvato Premium Design">
            <div class="auth-visual-overlay"></div>
            <div class="auth-visual-content">
                <span class="auth-visual-tag">Series 01 / Auth</span>
                <h2 class="auth-visual-title">Unlock your<br>Creative<br>Potential.</h2>
                <p class="text-muted">Join the elite community of designers and developers building the future of digital interfaces.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-content">
            <a href="index.html" class="back-to-site">
                <i data-lucide="arrow-left" style="width: 16px;"></i>
                Back to site
            </a>

            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="header-logo mb-6" style="font-size: 1.5rem; letter-spacing: 0.1em; color: var(--text-primary); font-family: var(--font-display);">CANVATO.</div>
                        <h1 class="auth-title">Welcome Back</h1>
                        <p class="auth-subtitle">Enter your credentials to access your studio.</p>
                    </div>

                    <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='profile.html';">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-input" placeholder="name@company.com" required>
                        </div>

                        <div class="form-group">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <label class="form-label">Password</label>
                                <a href="forgot-password.html" class="auth-link" style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;">Forgot?</a>
                            </div>
                            <input type="password" class="form-input" placeholder="••••••••" required>
                        </div>

                        <div class="form-footer">
                            <label class="checkbox-group">
                                <input type="checkbox">
                                <span>Remember me</span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary auth-button">Initialize Studio</button>
                    </form>

                    <div class="social-auth">
                        <div class="social-divider">
                            <span>Or continue with</span>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <button class="social-btn">
                                <img src="https://www.svgrepo.com/show/355037/google.svg" width="18" alt="Google">
                                Google
                            </button>
                            <button class="social-btn">
                                <img src="https://www.svgrepo.com/show/341847/github.svg" width="18" alt="Github" style="filter: invert(1);">
                                Github
                            </button>
                        </div>
                    </div>
                </div>

                <div class="auth-footer-links">
                    Don't have an account? <a href="signup.html" class="auth-link">Sign up</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
