<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Canvato</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-page">
        <!-- Visual Side -->
        <div class="auth-visual">
            <img src="assets/images/auth_bg.png" alt="Canvato Premium Design">
            <div class="auth-visual-overlay"></div>
            <div class="auth-visual-content">
                <span class="auth-visual-tag">Series 01 / Security</span>
                <h2 class="auth-visual-title">Update your<br>Security<br>Shield.</h2>
                <p class="text-muted">Enter your new password below to regain full access to your studio.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-content">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="header-logo mb-6" style="font-size: 1.5rem; letter-spacing: 0.1em; color: var(--text-primary); font-family: var(--font-display);">CANVATO.</div>
                        <h1 class="auth-title">Reset Password</h1>
                        <p class="auth-subtitle">Choose a strong password for your studio.</p>
                    </div>

                    <form class="auth-form" onsubmit="event.preventDefault(); alert('Password successfully updated. Redirecting to login...'); window.location.href='login.html';">
                        <div class="form-group">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-input" placeholder="••••••••" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" class="form-input" placeholder="••••••••" required>
                        </div>

                        <div style="font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">
                            Password must be at least 8 characters long.
                        </div>

                        <button type="submit" class="btn btn-primary auth-button">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
